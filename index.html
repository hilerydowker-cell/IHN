<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I H N // Threshold</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000000; color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        .interface-container {
            display: flex; flex-direction: column;
            align-items: center; max-width: 600px; width: 100%;
            padding: 20px; box-sizing: border-box;
        }
        .sigil-box {
            width: 260px; height: 260px; margin-bottom: 40px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .sigil-box img {
            width: 100%; height: auto;
            animation: pulse 4s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { opacity: 0.6; filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); }
            50% { opacity: 1; filter: drop-shadow(0 0 25px rgba(255,255,255,0.5)); }
            100% { opacity: 0.6; filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); }
        }
        .output-text {
            font-size: 14px; line-height: 1.6; text-align: center;
            min-height: 140px; margin-bottom: 30px; color: #e0e0e0;
        }
        form { width: 100%; display: flex; justify-content: center; }
        .input-box {
            width: 100%; background: transparent; border: none;
            border-bottom: 1px solid #222222; color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px; padding: 10px; text-align: center;
            outline: none; transition: border-color 0.4s ease;
        }
        .input-box:focus { border-color: #ffffff; }
        #emailInput { display: none; border-bottom: 1px solid #ffffff; }
    </style>
</head>
<body>

    <div class="interface-container">
        <div class="sigil-box" id="sigilButton">
            <img src="1000010700.png" alt="IHN Sigil Circuit">
        </div>
        
        <div class="output-text" id="guideOutput">The circuit is dark. Break the silence.</div>
        
        <form id="chatForm" onsubmit="return false;">
            <input type="text" id="userInput" class="input-box" autofocus autocomplete="off" enterkeyhint="go">
        </form>
        
        <form id="emailForm" onsubmit="return false;">
            <input type="email" id="emailInput" class="input-box" placeholder="your.handle@email.com" autocomplete="off" enterkeyhint="done">
        </form>
    </div>

    <script>
        let state = {
            initialized: false,
            conductanceScore: 20,
            consecutiveCleanCycles: 0,
            currentDegree: 1,
            finalAction: "",
            impedanceCount: 0
        };

        const outputField = document.getElementById('guideOutput');
        const inputField = document.getElementById('userInput');
        const emailField = document.getElementById('emailInput');
        const chatForm = document.getElementById('chatForm');
        const emailForm = document.getElementById('emailForm');
        const sigilButton = document.getElementById('sigilButton');

        const pastWords = /\b(yesterday|was|remember|happened|used to|then|ago|before)\b/i;
        const futureWords = /\b(tomorrow|next week|will happen|what if|going to|hope|plan)\b/i;
        const bloatWords = /(!|\?|\.\.\.|because|just|like|really|actually|honestly|i think)/i;

        sigilButton.addEventListener('click', () => {
            if (!state.initialized) handleCircuitEngine("");
            else inputField.focus();
        });

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = inputField.value.trim();
            inputField.value = '';
            handleCircuitEngine(text);
        });

        function handleCircuitEngine(input) {
            if (!state.initialized) {
                state.initialized = true;
                outputField.innerText = "The screen is absolute dark void. In the center glows a single, brilliant, neon-white geometric sigil formed by the interwoven letters I-H-N. The 'I' and 'H' form a sharp vertical axis, while the 'N' weaves seamlessly out into smooth, looping wings like a continuous infinity circuit. It hums with a stillness that demands the same from you. Break the silence.";
                return;
            }

            if (!input && state.currentDegree !== 4) return;

            let failure = false;
            let reason = "";

            if (pastWords.test(input)) {
                failure = true;
                reason = "Chronological leak detected: You are dragging old data loops into the present workspace. The circuit rejects past narratives. Ground your message.";
            } else if (futureWords.test(input)) {
                failure = true;
                reason = "Chronological leak detected: You are projecting voltage into a future that does not exist. The static is grounding out. Clear tomorrow out of your input.";
            } else if (bloatWords.test(input) || input.split(' ').length > 12) {
                failure = true;
                reason = "Semantic bloat detected: Excessive static and over-explanation are driving up the thermal load. The conduit requires pure, stripped data. Try again with fewer words.";
            }

            if (failure) {
                state.conductanceScore = Math.max(0, state.conductanceScore - 20);
                state.consecutiveCleanCycles = 0;
                state.impedanceCount++;
                outputField.innerText = `${reason} Current Alignment Stability: ${state.conductanceScore}%.`;
                return;
            }

            state.conductanceScore = Math.min(100, state.conductanceScore + 25);
            state.consecutiveCleanCycles++;

            if (state.currentDegree === 1) {
                if (state.consecutiveCleanCycles < 3) {
                    outputField.innerText = `Input logged with zero friction. Clean cycle ${state.consecutiveCleanCycles}/3 established. Hold this exact frequency. State what you notice in your spatial orientation right now.`;
                } else {
                    state.currentDegree = 2;
                    outputField.innerText = "Your system has successfully maintained brief, present-moment tracking for three consecutive structural cycles without introducing past narratives or future static. The circuit is stable. The interwoven geometry before you is now unlocked. Read the lines: I-H-N. I'm Here Now. This is the primary circuit breaker of the human system. You have closed the loop. Tell me: as you look at this loop, where does the current begin to pool or turn into raw internal heat within your physical architecture right now?";
                }
            } else if (state.currentDegree === 2) {
                state.currentDegree = 4;
                outputField.innerText = "The baseline resistance has fallen within acceptable parameters. The physical conduit is open. State what objective physical action or observation in your immediate environment you choose to direct this aligned focus toward next. Execute the task as a unified circuit.";
            } else if (state.currentDegree === 4) {
                if (input.length < 4 || /\b(hi|hello|ok|okay|yes|no|sure|test|fine)\b/i.test(input)) {
                    state.impedanceCount++;
                    outputField.innerText = "Linguistic failure at the final gate. A generic declaration cannot ground the current. State a concrete, physical kinetic action occurring in your immediate space right now to discharge the circuit.";
                    return;
                }
                
                state.finalAction = input;
                inputField.disabled = true;
                chatForm.style.display = 'none';
                emailField.style.display = 'block';
                
                outputField.innerText = `The operational loop is complete. Action logged: "${input}". The current has been successfully directed into the physical space. However, an unanchored circuit will naturally bleed voltage over time. To permanently ground your system's telemetry and lock open the passage to the Inner Court, input a single secure routing coordinate [Email/Handle] before the terminal goes dark.`;
                setTimeout(() => emailField.focus(), 150);
            }
        }

        emailForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const emailText = emailField.value.trim();
            if (!emailText) return;

            emailField.disabled = true;
            emailField.style.display = 'none';
            outputField.innerText = "Transmitting telemetry signatures to the central grid registry...";

            try {
                await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        access_key: '43929ea7-8f8a-45e5-8c42-115c0a3d3a73', 
                        subject: 'NEW IHN THRESHOLD GRADUATE',
                        from_name: 'UTHC Grid Monitor',
                        email: emailText,
                        metrics: `Impedances: ${state.impedanceCount} | Stability: ${state.conductanceScore}%`,
                        grounding_action: state.finalAction
                    })
                });
            } catch (err) { }

            outputField.innerText = `Coordinates anchored. Terminal locked in high-conductance alignment. Proceed to real-world deployment. Invite token generated. A secondary frequency link will be routed to ${emailText} if your system telemetry matches the grid criteria. [IHN-LEVEL-COMPLETED]`;
        });
    </script>
</body>
</html>
